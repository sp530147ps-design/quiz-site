<!DOCTYPE html>
<html>
<head>
<title>NEET Quiz</title>
<style>
body { font-family: Arial; text-align:center; background:black; color:white; }
button { padding:10px; margin:10px; width:80%; background:green; color:white; border:none; }
</style>
</head>
<body>

<h2>NEET Biology Quiz</h2>
<p id="question"></p>
<div id="options"></div>
<p id="score"></p>

<script>
let questions=[
{q:"Cell powerhouse?",a:["Nucleus","Mitochondria","Ribosome","ER"],c:1},
{q:"Universal donor?",a:["A","B","AB","O"],c:3}
];

let current=0,score=0;

function load(){
let q=questions[current];
document.getElementById("question").innerText=q.q;
let html="";
for(let i=0;i<q.a.length;i++){
html+=`<button onclick="check(${i})">${q.a[i]}</button>`;
}
document.getElementById("options").innerHTML=html;
}
function check(i){
if(i===questions[current].c){score++;}
current++;
if(current<questions.length){load();}
else{
document.getElementById("question").innerText="Finished!";
document.getElementById("options").innerHTML="";
document.getElementById("score").innerText="Score: "+score;
}
}
load();
</script>

</body>
</html>
